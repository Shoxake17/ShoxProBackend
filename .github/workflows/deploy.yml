name: CI/CD Pipeline - ShoxPro Backend

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  # 1. XAVFSIZLIK TAHLILI
  semgrep_sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep Full Scan
        run: |
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/javascript \
            --config=p/nodejs \
            --sarif \
            --output=semgrep.sarif \
            . || true

      - name: Upload Report to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # 2. BUILD VA PUSH (Kichik harf muammosi hal qilingan)
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: semgrep_sast
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # MUHIM: Shoxake17 o'rniga shoxake17 (kichik harfda)
          tags: ghcr.io/shoxake17/shoxprobackend:latest
          no-cache: true

  # 3. DEPLOY
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p ~/shoxpro
            cd ~/shoxpro
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Kichik harfdagi tagni tortib olamiz
            docker pull ghcr.io/shoxake17/shoxprobackend:latest
            
            # Agar serveringizda docker-compose.yml bo'lsa:
            docker-compose up -d --force-recreate
            
            docker logout ghcr.io

  # 4. DAST SCAN
  security_scan:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run ZAP Scan
        run: |
          mkdir -p zap_reports
          chmod -R 777 $(pwd)
          docker run --rm -v $(pwd):/zap/wrk/:rw zaproxy/zap-stable \
            zap-full-scan.py -t https://shoxpro.uz -r zap_report.html || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-reports
          path: zap_report.html